{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Slot Booking System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'booking/styles.css' %}">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <a href="/" class="brand"><span class="brand-mark"></span>Slot Booking System</a>
        <nav class="nav-links">
          <a class="nav-link active" href="{% url 'login' %}">Login</a>
          <a class="btn btn-primary" href="/register/">Register</a>
        </nav>
      </div>
    </header>

    <main class="auth-layout">
      <section class="card auth-card">
        <h1 class="section-title">Welcome back</h1>
        <p class="section-subtitle">Login to manage your slot bookings.</p>

        {% if form.errors %}
          <div class="alert">Invalid email/username or password.</div>
        {% endif %}

        <form method="post" class="form-grid">
          {% csrf_token %}
          <div class="form-group">
            <label for="username" class="form-label">Email</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M4 6h16v12H4z" stroke="currentColor" stroke-width="1.7"/>
                  <path d="m4 7 8 6 8-6" stroke="currentColor" stroke-width="1.7"/>
                </svg>
              </span>
              <input id="username" name="username" type="text" class="form-control" placeholder="you@example.com" required />
            </div>
          </div>

          <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <rect x="4" y="10" width="16" height="10" rx="2" stroke="currentColor" stroke-width="1.7"/>
                  <path d="M8 10V8a4 4 0 1 1 8 0v2" stroke="currentColor" stroke-width="1.7"/>
                </svg>
              </span>
              <input id="password" name="password" type="password" class="form-control" placeholder="Enter your password" required />
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-block">Login</button>
        </form>

        <p class="muted-link">New user? <a href="/register/" class="text-link">Create an account</a></p>
      </section>
    </main>
  </div>
</body>
</html>
